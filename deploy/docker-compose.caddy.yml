# Merge with docker-compose.prod.yml for HTTPS at the edge (Let's Encrypt).
#
#   export WEB_HOST=app.example.com API_HOST=api.example.com CADDY_EMAIL=you@example.com
#   export FRONTEND_URL=https://app.example.com
#   export NEXT_PUBLIC_API_URL=https://api.example.com
#   docker compose -f docker-compose.prod.yml -f deploy/docker-compose.caddy.yml up --build
#
# Point DNS A/AAAA for WEB_HOST and API_HOST at this machine. Open ports 80 and 443.
# Set TRUSTED_HOSTS on the API to your API_HOST (e.g. api.example.com).

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      WEB_HOST: ${WEB_HOST:?Set WEB_HOST e.g. app.example.com}
      API_HOST: ${API_HOST:?Set API_HOST e.g. api.example.com}
      CADDY_EMAIL: ${CADDY_EMAIL:?Set CADDY_EMAIL for ACME registration}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
