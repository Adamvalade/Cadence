# Optional merge files (from repo root): deploy/docker-compose.caddy.yml, deploy/docker-compose.secrets.yml,
# deploy/docker-compose.backup.yml — see deploy/README.md
#
# Environment variables: put them in a file named `.env` in THIS directory (repo root),
# next to this compose file. Run:  cp .env.example .env  then edit `.env`.
# Docker Compose loads root `.env` automatically for ${VAR} substitution — not api/.env.

services:
  db:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cadence
      POSTGRES_USER: cadence
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadence"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    restart: unless-stopped
    build: ./api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://cadence:${POSTGRES_PASSWORD}@db:5432/cadence
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY - min 32 chars for production}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-}
      SPOTIFY_MARKET: ${SPOTIFY_MARKET:-US}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      # Optional: comma-separated API hostnames for TrustedHostMiddleware (e.g. api.example.com)
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      DEMO_LOGIN_ENABLED: ${DEMO_LOGIN_ENABLED:-false}
      DEMO_USER_EMAIL: ${DEMO_USER_EMAIL:-demo@cadence.local}
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-}
      DEMO_LOGIN_AUTO_CREATE: ${DEMO_LOGIN_AUTO_CREATE:-true}
      DEMO_SEED_AT_STARTUP: ${DEMO_SEED_AT_STARTUP:-true}
      # Set to /api if your edge forwards https://site.com/api/* here without stripping /api (see .env.example).
      API_ROOT_PATH: ${API_ROOT_PATH:-}
    ports: ["8000:8000"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; r=urllib.request.urlopen(\"http://127.0.0.1:8000/health\", timeout=5); exit(0 if r.status==200 else 1)"',
        ]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 90s

  web:
    restart: unless-stopped
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        # Omit from .env to show “Try demo” when enabled server-side; set to false to hide the button.
        NEXT_PUBLIC_DEMO_LOGIN: ${NEXT_PUBLIC_DEMO_LOGIN}
    environment:
      # Internal base for server-side proxy; append API_ROOT_PATH when the API mounts under /api.
      API_URL: http://api:8000${API_ROOT_PATH:-}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_DEMO_LOGIN: ${NEXT_PUBLIC_DEMO_LOGIN}
    depends_on:
      api:
        condition: service_healthy
    ports: ["3000:3000"]

volumes:
  pgdata:
