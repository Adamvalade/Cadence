# Optional: load DB password and API SECRET_KEY from files (Docker / Swarm secrets, 1Password CLI, etc.).
#
#   mkdir -p secrets
#   printf '%s' "$(openssl rand -base64 48)" > secrets/secret_key.txt
#   printf '%s' "your-db-password" > secrets/postgres_password.txt
#   chmod 600 secrets/*.txt
#   docker compose -f docker-compose.prod.yml -f deploy/docker-compose.secrets.yml up --build
#
# The API entrypoint reads SECRET_KEY_FILE and POSTGRES_PASSWORD_FILE and exports SECRET_KEY / DATABASE_URL.
# Postgres uses POSTGRES_PASSWORD_FILE. You can still set POSTGRES_PASSWORD in .env for compose interpolation,
# but the running containers use the secret files when present.

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  secret_key:
    file: ./secrets/secret_key.txt

services:
  db:
    secrets:
      - postgres_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_PASSWORD: ""

  api:
    secrets:
      - postgres_password
      - secret_key
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      SECRET_KEY_FILE: /run/secrets/secret_key
      DATABASE_URL: postgresql+asyncpg://cadence:from-secret-file@db:5432/cadence
