# Optional: secrets from ./secrets/*.txt. Merge with prod compose; see deploy/README.md.

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  secret_key:
    file: ./secrets/secret_key.txt

services:
  db:
    secrets:
      - postgres_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password

  api:
    secrets:
      - postgres_password
      - secret_key
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      SECRET_KEY_FILE: /run/secrets/secret_key
      DATABASE_URL: postgresql+asyncpg://cadence:from-secret-file@db:5432/cadence
