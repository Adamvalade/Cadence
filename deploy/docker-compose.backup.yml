# Daily pg_dump of the cadence database to ./data/pg-backups (merged with prod compose).
#
#   mkdir -p data/pg-backups
#   docker compose -f docker-compose.prod.yml -f deploy/docker-compose.backup.yml up -d
#
# First backup runs immediately; then every 24h. Drops local .gz files older than 14 days.

services:
  pg-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE:-}
    volumes:
      - ./deploy/backup/docker-entrypoint.sh:/entrypoint.sh:ro
      - pg_backups:/backups
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - default

volumes:
  pg_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/pg-backups
